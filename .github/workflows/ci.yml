name: Rust CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Test and Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        # The spec review mentions clippy fails, so we won't strictly enforce -D warnings here for now,
        # or we just run it normally so it shows warnings.
        run: cargo clippy --all-targets --all-features

      - name: Run Unit Tests (Filer)
        run: cargo test
        working-directory: ./filer

      - name: Run Unit Tests (Mounty)
        run: cargo test
        working-directory: ./mounty

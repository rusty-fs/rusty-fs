name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Test and Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install OS Dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libfuse-dev libfuse3-dev

      - name: Check Formatting (Filer)
        run: cargo fmt --all -- --check
        working-directory: ./filer

      - name: Check Formatting (Mounty)
        run: cargo fmt --all -- --check
        working-directory: ./mounty

      - name: Run Clippy (Filer)
        run: cargo clippy --all-targets --all-features
        working-directory: ./filer

      - name: Run Clippy (Mounty)
        run: cargo clippy --all-targets --all-features
        working-directory: ./mounty

      - name: Run Unit Tests (Filer)
        run: cargo test
        working-directory: ./filer

      - name: Run Unit Tests (Mounty)
        run: cargo test
        working-directory: ./mounty

[package]
name = "remote-fs-server"
version = "0.1.0"
edition = "2024"
# axum = "0.8.4"   # remove this stray key from [package]

[dependencies]
axum = { version = "0.8.4", features = ["macros"] }
env_logger = "0.11.8"
log = "0.4.27"
serde = { version = "1.0.219", features = ["derive"] }
tokio = { version = "1.47.1", features = ["full"] }
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
tracing = "0.1"
serde_json = "1.0.142"
